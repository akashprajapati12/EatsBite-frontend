<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - EatsBite</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="images/logo.png">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        .page-header {
            padding-top: 150px;
            text-align: center;
            margin-bottom: 50px;
        }
        .page-title {
            font-size: 3rem;
            color: var(--accent);
            font-family: 'Playfair Display', serif;
        }
        .orders-page {
            min-height: 50vh;
        }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">
            <i class="fa-solid fa-utensils"></i> Eats<span>Bite</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html#hero">Home</a></li>
            <li><a href="index.html#menu">Menu</a></li>
            <li><a href="orders.html" id="myOrdersLink">My Orders</a></li>
        </ul>
        <div class="nav-actions">
            <!-- Order page doesn't need cart btn displayed necessarily, or we can keep it hidden -->
            <button id="authBtn" class="btn primary-btn">Login</button>
            <div id="userProfile" style="display: none;" class="user-profile dropdown">
                <div class="user-btn" id="userMenuBtn">
                    <i class="fa-solid fa-user-circle"></i> <span id="userNameDisplay"></span> <i class="fa-solid fa-chevron-down"></i>
                </div>
                <div class="dropdown-menu" id="userDropdown" style="display: none;">
                    <button id="profileBtn" class="dropdown-item"><i class="fa-solid fa-address-card"></i> Edit Profile</button>
                    <button id="deleteAccountBtn" class="dropdown-item text-danger"><i class="fa-solid fa-trash"></i> Delete Account</button>
                    <button id="logoutBtn" class="dropdown-item"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Orders Section -->
    <section class="orders-page" style="padding-bottom: 100px;">
        <div class="page-header">
            <h1 class="page-title">Order History</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem; margin-top: 10px;">A receipt of your premium culinary journeys.</p>
        </div>
        <div class="orders-container" id="ordersList">
            <!-- Orders injected here -->
        </div>
    </section>

    <!-- Edit Profile Modal Overlay -->
    <div class="modal-overlay" id="editProfileModal">
        <div class="modal auth-modal">
            <div class="modal-header">
                <h3>Edit Profile</h3>
                <button class="close-btn" id="closeProfileBtn"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="profileForm">
                    <div class="input-group">
                        <i class="fa-solid fa-id-card"></i>
                        <input type="text" id="editFullname" placeholder="Full Name" autocomplete="off" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="editEmail" placeholder="Email Address" autocomplete="off" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-phone"></i>
                        <input type="tel" id="editMobile" placeholder="Mobile Number" autocomplete="off" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-map-marker-alt"></i>
                        <input type="text" id="editAddress" placeholder="Delivery Address" autocomplete="off" required>
                    </div>
                    <button type="submit" class="btn primary-btn full-width">Save Changes</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Auth Modal Overlay -->
    <div class="modal-overlay" id="authModal">
        <div class="modal auth-modal" id="authModalContent">
            <div class="modal-header">
                <h3 id="authTitle">Login to EatsBite</h3>
                <button class="close-btn" id="closeAuthBtn"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="authForm">
                    <div class="input-group">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="username" placeholder="Username" required autocomplete="off">
                    </div>
                    
                    <div class="input-group signup-only" style="display: none;">
                        <i class="fa-solid fa-id-card"></i>
                        <input type="text" id="fullname" placeholder="Full Name" autocomplete="off">
                    </div>
                    <div class="input-group signup-only" style="display: none;">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" placeholder="Email Address" autocomplete="off">
                    </div>
                    <div class="input-group signup-only" style="display: none;">
                        <i class="fa-solid fa-phone"></i>
                        <input type="tel" id="mobile" placeholder="Mobile Number" autocomplete="off">
                    </div>
                    <div class="input-group signup-only" style="display: none;">
                        <i class="fa-solid fa-map-marker-alt"></i>
                        <input type="text" id="address" placeholder="Delivery Address" autocomplete="off">
                    </div>
                    <div class="input-group signup-only map-container" style="display: none; margin-bottom: 20px;">
                        <label style="color: var(--text-muted); font-size: 0.9rem; display: block; margin-bottom: 5px;">Pinpoint Delivery Location <small>(Tap on map)</small></label>
                        <div id="map" style="height: 200px; width: 100%; border-radius: 12px; z-index: 1; border: 1px solid var(--border-subtle);"></div>
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Password" required autocomplete="off">
                    </div>
                    <button type="submit" class="btn primary-btn full-width" id="submitAuthBtn">Login</button>
                </form>
                <div class="auth-switch">
                    <span id="authSwitchPrompt">Don't have an account?</span> <a href="#" id="toggleAuthMode">Sign Up</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="brand">
                <i class="fa-solid fa-utensils"></i> Eats<span>Bite</span>
            </div>
            <p>&copy; 2026 EatsBite Premium Dining. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!currentUser) {
                authModal.classList.add('active');
            }
        });
    </script>
</body>
</html>
